<div class="mt-2 p-4 bg-secondary text-white rounded">
  <h3>Reactive Form using FormGroup</h3>
</div>

<div class="container">
    <div class="row">  
        <div class="col-6"> 
          <table class="table table-borded">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let user of usersArray">
                <td>{{user.id}}</td>
                <td>{{user.name}}</td>
                <td>{{user.username}}</td>
                <td>{{user.email}}</td>
                <td>
                  <button class="btn btn-primary" (click)="onEditUser(user.id)">Edit</button>
                  
                </td>
              </tr>
            </tbody>        
          </table>  

        </div>> 

    </div>
  <form [formGroup]="userForm" >

    <div class="row">
      <div class="col-6">
        <label>Name</label>
        <input type="text" class="form-control" formControlName="name">
      </div>
    </div>

    <div class="row">
      <div class="col-6">
        <label>Username</label>
        <input type="text" class="form-control" formControlName="username">
      </div>
    </div>

    <div class="row">
      <div class="col-6">
        <label>Email</label>
        <input type="text" class="form-control" formControlName="email">
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-6">
        <button  class="btn btn-primary" (click)="onSaveUser()">Save User</button>
      </div>
    </div>

  </form>
</div>
