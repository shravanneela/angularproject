<div class="auth-page">
  <h1 class="heading">
    <span class="focus">Focus on</span>
    <span class="today">Today</span>
  </h1>

  <div class="container auth-container">
    <div class="auth-header">
      <h2 class="auth-title">Create your account</h2>
      <p class="auth-subtitle">Join us to start your productive journey</p>
    </div>

    <form class="auth-form"  [formGroup]="registrationForm"  (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-row">
          <input
            type="text"
            id="name"
            class="form-input"
            placeholder="John Doe"
            
            name="fullName"
            
            required
              formControlName="fullName"
          />
        </div>
      </div>
      <div *ngIf="submitted && registrationForm.controls.fullName.errors">
          <small style="color: red" *ngIf="registrationForm.controls.fullName.errors['required']">
            Full name is required</small
          >
          <small style="color: red" *ngIf="registrationForm.controls.fullName.errors['email']"
            >Enter the full name</small
          >
        </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-row">
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            
            name="email"
            
            required
              formControlName="email" 

          />
        </div>
      </div>
      <div *ngIf="submitted && registrationForm.controls.email.errors">
          <small style="color: red" *ngIf="registrationForm.controls.email.errors['required']">
            Email is required</small
          >
          <small style="color: red" *ngIf="registrationForm.controls.email.errors['email']"
            >Enter valid email</small
          >
        </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-row password-row">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Create a password"
            
            name="password"
             
            required
              formControlName="password"  
          />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <div *ngIf="submitted && registrationForm.controls.password.errors">
          <small style="color: red;"
          *ngIf="registrationForm.controls.password.errors['required']"
          >password is required</small>
          <small style="color: red;"
          *ngIf="registrationForm.controls.password.errors['minlength']"
          ></small>
        </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="input-row password-row">
          <input
            type="password"
            id="confirm-password"
            class="form-input"
            placeholder="Confirm your password"
            
            name="confirmPassword"
            
            required
              formControlName="confirmPassword"
          />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <div *ngIf="submitted && registrationForm.controls.confirmPassword.errors">
          <small style="color: red;"
          *ngIf="registrationForm.controls.confirmPassword.errors['required']"
          >Confirm Password is required</small>
          <small style="color: red;"
          *ngIf="registrationForm.controls.confirmPassword.errors['minlength']"
          ></small>
        </div>

      <label class="remember-label">
        <input type="checkbox" formControlName="agreeterms" class="remember-checkbox" />
        <span>I agree to Terms and Conditions</span>
      </label>

      <p class="auth-message" aria-live="polite"></p>

      <button (click)="onSubmit()" type="submit" class="btn-primary">Sign Up</button>
    
    
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="#" class="auth-link">Sign In</a>
    </p>
  </div>
</div>
